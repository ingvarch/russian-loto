<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>Russian Loto -- Live Game</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text: #1c1c1e;
    --text-dim: #636366;
    --border: #d1d1d6;
    --accent: #ff6b35;
    --accent-text: #ffffff;
    --level1: #5856d6;
    --level2: #af52de;
    --level3: #ff3b30;
    --modal-bg: rgba(0, 0, 0, 0.5);
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --text: #ffffff;
      --text-dim: #98989d;
      --border: #38383a;
      --accent: #ff6b35;
      --accent-text: #ffffff;
      --level1: #7d7aff;
      --level2: #d573ff;
      --level3: #ff6058;
      --modal-bg: rgba(0, 0, 0, 0.7);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 5;
  }
  .counter { font-size: 18px; font-weight: 600; }
  .counter .total { color: var(--text-dim); font-weight: 400; }
  .new-game-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .new-game-btn:active { background: var(--border); }

  .grid-wrap { padding: 12px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 4px;
    max-width: 600px; margin: 0 auto;
  }
  .cell {
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px; font-weight: 600;
    color: var(--text);
    cursor: pointer; user-select: none;
    transition: transform 0.05s;
  }
  .cell:active { transform: scale(0.95); }
  .cell.called {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .cell.placeholder {
    background: transparent; border: 1px dashed var(--border);
    cursor: default; opacity: 0.3;
  }

  .close-section {
    padding: 6px 16px 4px;
    max-width: 600px; margin: 0 auto;
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 8px;
    font-size: 13px;
  }
  .close-section.hidden { display: none; }
  .close-label {
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    font-size: 11px;
  }
  .close-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .close-chip {
    display: inline-block;
    padding: 3px 10px;
    background: color-mix(in srgb, var(--accent) 14%, var(--surface));
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 12px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    font-variant-numeric: tabular-nums;
    transition: transform 0.05s;
  }
  .close-chip:active { transform: scale(0.95); background: var(--accent); color: var(--accent-text); }

  .log-section { padding: 0 12px 24px; max-width: 600px; margin: 0 auto; }
  .log-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    color: var(--text-dim); letter-spacing: 0.5px;
    padding: 16px 4px 8px;
  }
  .log-empty { color: var(--text-dim); font-size: 14px; padding: 8px 4px; }
  .log-entry {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    animation: slideIn 0.2s ease-out;
  }
  .log-entry:active { background: var(--border); }
  .log-entry .ts {
    color: var(--text-dim); font-size: 13px; font-variant-numeric: tabular-nums;
    min-width: 40px;
  }
  .log-entry .seq {
    font-weight: 700; font-variant-numeric: tabular-nums;
    min-width: 50px;
  }
  .log-entry .level { font-weight: 500; flex: 1; }
  .log-entry.level-1 { border-left: 4px solid var(--level1); }
  .log-entry.level-2 { border-left: 4px solid var(--level2); }
  .log-entry.level-3 {
    border-left: 4px solid var(--level3);
    background: color-mix(in srgb, var(--level3) 10%, var(--surface));
  }
  .log-entry.level-1 .level { color: var(--level1); }
  .log-entry.level-2 .level { color: var(--level2); }
  .log-entry.level-3 .level { color: var(--level3); font-weight: 700; }

  @keyframes slideIn {
    from { transform: translateY(-8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: var(--modal-bg);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    padding: 20px;
    max-width: 320px; width: 100%;
    box-shadow: var(--shadow);
  }
  .modal-title { font-size: 17px; font-weight: 600; margin: 0 0 8px; }
  .modal-text { font-size: 14px; color: var(--text-dim); margin: 0 0 16px; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 16px; font-weight: 500; cursor: pointer;
  }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-confirm { background: var(--accent); color: var(--accent-text); }
  .btn-danger { background: var(--level3); color: white; }

  .sheet-backdrop {
    position: fixed; inset: 0;
    background: var(--modal-bg);
    display: none;
    z-index: 40;
    animation: fadeIn 0.2s;
  }
  .sheet-backdrop.open { display: block; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 8px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 60vh;
    box-shadow: var(--shadow);
    transform: translateY(100%);
    transition: transform 0.25s ease-out;
    z-index: 41;
    overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 6px auto 14px;
  }
  .sheet-header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .sheet-seq { font-size: 22px; font-weight: 700; }
  .sheet-cid { font-family: ui-monospace, "SF Mono", monospace; color: var(--text-dim); font-size: 13px; }
  .sheet-stars { font-size: 18px; }
  .sheet-progress { color: var(--text-dim); font-size: 14px; margin-left: auto; font-variant-numeric: tabular-nums; }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 3px;
    max-width: 540px; margin: 0 auto;
  }
  .card-cell {
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
  }
  .card-cell.empty { border-color: transparent; }
  .card-cell.closed {
    background: var(--accent); color: var(--accent-text); border-color: var(--accent);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (min-width: 700px) {
    .grid-wrap { padding: 24px; }
    .cell { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="counter"><span id="counter-called">0</span><span class="total">/90</span></div>
  <button class="new-game-btn" id="new-game-btn">Новая игра</button>
</header>

<div class="grid-wrap">
  <div class="grid" id="number-grid"></div>
</div>

<section class="close-section hidden" id="close-section">
  <span class="close-label" id="close-label">4 из 5 в линии:</span>
  <span class="close-list" id="close-list"></span>
</section>

<section class="log-section">
  <div class="log-title">События</div>
  <div id="log"></div>
</section>

<div class="modal-backdrop" id="confirm-uncall">
  <div class="modal">
    <p class="modal-title">Отжать число <span id="confirm-uncall-num"></span>?</p>
    <p class="modal-text">Связанные события могут исчезнуть из лога.</p>
    <div class="modal-actions">
      <button class="btn-cancel" data-action="cancel">Отмена</button>
      <button class="btn-confirm" data-action="confirm">Отжать</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="confirm-reset">
  <div class="modal">
    <p class="modal-title">Сбросить текущую игру?</p>
    <p class="modal-text">Все отмеченные числа и события будут удалены.</p>
    <div class="modal-actions">
      <button class="btn-cancel" data-action="cancel">Отмена</button>
      <button class="btn-danger" data-action="confirm">Сбросить</button>
    </div>
  </div>
</div>

<div class="sheet-backdrop" id="sheet-backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-seq" id="sheet-seq"></span>
    <span class="sheet-cid" id="sheet-cid"></span>
    <span class="sheet-stars" id="sheet-stars"></span>
    <span class="sheet-progress" id="sheet-progress"></span>
  </div>
  <div class="card-grid" id="sheet-card"></div>
</div>

<script type="application/json" id="cards-data">{{CARDS_JSON}}</script>

<script>
(function () {
  "use strict";

  const CARDS = JSON.parse(document.getElementById("cards-data").textContent);
  const STORAGE_KEY = "loto-game-state";
  const LEVEL_LABELS = { 1: "одна линия", 2: "две линии", 3: "БИНГО" };

  // ---- State ----
  let state = loadState() || freshState();

  function freshState() {
    return {
      called: [],            // sorted array of called numbers
      events: [],            // [{ts, cid, seq, level}], newest at index 0
      cardLevel: {},         // cid -> current level (0..3)
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.called)) return null;
      return parsed;
    } catch (e) {
      return null;
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      // localStorage may be unavailable in private mode; degrade silently
    }
  }

  function calledSet() {
    return new Set(state.called);
  }

  // ---- Game logic ----
  // card.rows is [[int|null]*9, [int|null]*9, [int|null]*9].
  // A row is "closed" when every non-null cell is in the called set.
  function levelOf(card, called) {
    let lines = 0;
    for (const row of card.rows) {
      let allClosed = true;
      for (const n of row) {
        if (n === null) continue;
        if (!called.has(n)) { allClosed = false; break; }
      }
      if (allClosed) lines += 1;
    }
    return lines;
  }

  // A card is "close" when it has at least one row that is 4/5 called -- i.e.
  // one call away from closing a line. Already-closed rows don't count.
  function isCardClose(card, called) {
    for (const row of card.rows) {
      let hit = 0;
      let total = 0;
      for (const n of row) {
        if (n === null) continue;
        total += 1;
        if (called.has(n)) hit += 1;
      }
      if (total === 5 && hit === 4) return true;
    }
    return false;
  }

  function closeCards(called) {
    return CARDS.filter((card) => isCardClose(card, called));
  }

  function recomputeAndEmit() {
    const called = calledSet();
    const newLevels = {};
    const ts = nowHHMM();

    for (const card of CARDS) {
      const prev = state.cardLevel[card.cid] || 0;
      const next = levelOf(card, called);
      newLevels[card.cid] = next;

      if (next > prev) {
        // Crossed one or more thresholds upward; emit one event per new level
        for (let lvl = prev + 1; lvl <= next; lvl++) {
          state.events.unshift({
            ts: ts,
            cid: card.cid,
            seq: card.seq,
            level: lvl,
          });
        }
      } else if (next < prev) {
        // Reversed: drop log entries for levels above the new one
        state.events = state.events.filter(
          (e) => !(e.cid === card.cid && e.level > next)
        );
      }
    }
    state.cardLevel = newLevels;
  }

  function nowHHMM() {
    const d = new Date();
    return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
  }

  function callNumber(n) {
    if (state.called.includes(n)) return;
    state.called.push(n);
    state.called.sort((a, b) => a - b);
    recomputeAndEmit();
    saveState();
    render();
  }

  function uncallNumber(n) {
    const idx = state.called.indexOf(n);
    if (idx === -1) return;
    state.called.splice(idx, 1);
    recomputeAndEmit();
    saveState();
    render();
  }

  function resetGame() {
    state = freshState();
    saveState();
    render();
  }

  // ---- Rendering ----
  const gridEl = document.getElementById("number-grid");
  const logEl = document.getElementById("log");
  const counterEl = document.getElementById("counter-called");

  // Loto column ranges: col 0 = 1..9 (9 numbers), cols 1..7 = 10..79 (10 each),
  // col 8 = 80..90 (11 numbers). We use a 9x11 grid; short columns have placeholders
  // in the bottom rows. Every number stays in its semantically correct column.
  const GRID_ROWS = 11;
  const GRID_COLS = 9;

  function buildGrid() {
    gridEl.innerHTML = "";
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        const value = numberAt(c, r);
        if (value === null) {
          cell.classList.add("placeholder");
        } else {
          cell.textContent = String(value);
          cell.dataset.num = String(value);
          cell.addEventListener("click", () => onCellClick(value));
        }
        gridEl.appendChild(cell);
      }
    }
  }

  function numberAt(col, row) {
    if (col === 0) {
      return row < 9 ? row + 1 : null;       // 1..9, then 2 placeholders
    }
    if (col === 8) {
      return 80 + row;                        // 80..90, all 11 rows used
    }
    return row < 10 ? col * 10 + row : null;  // 10..19, ..., 70..79, then placeholder
  }

  function onCellClick(n) {
    if (state.called.includes(n)) {
      askUncall(n);
    } else {
      callNumber(n);
    }
  }

  function renderCells() {
    const called = calledSet();
    for (const cell of gridEl.querySelectorAll(".cell[data-num]")) {
      const n = Number(cell.dataset.num);
      cell.classList.toggle("called", called.has(n));
    }
  }

  function renderLog() {
    counterEl.textContent = String(state.called.length);
    if (state.events.length === 0) {
      logEl.innerHTML = '<div class="log-empty">Событий пока нет</div>';
      return;
    }
    logEl.innerHTML = "";
    for (const e of state.events) {
      const row = document.createElement("div");
      row.className = "log-entry level-" + e.level;
      row.innerHTML =
        '<span class="ts">' + e.ts + '</span>' +
        '<span class="seq">#' + String(e.seq).padStart(3, "0") + '</span>' +
        '<span class="level">' + LEVEL_LABELS[e.level] + '</span>';
      row.addEventListener("click", () => openSheet(e.cid));
      logEl.appendChild(row);
    }
  }

  function renderClose() {
    const called = calledSet();
    const close = closeCards(called);
    const section = document.getElementById("close-section");
    const label = document.getElementById("close-label");
    const list = document.getElementById("close-list");
    if (close.length === 0) {
      section.classList.add("hidden");
      list.innerHTML = "";
      return;
    }
    section.classList.remove("hidden");
    label.textContent = "4 из 5 в линии (" + close.length + "):";
    close.sort((a, b) => a.seq - b.seq);
    list.innerHTML = "";
    for (const card of close) {
      const chip = document.createElement("span");
      chip.className = "close-chip";
      chip.textContent = "#" + String(card.seq).padStart(3, "0");
      chip.addEventListener("click", () => openSheet(card.cid));
      list.appendChild(chip);
    }
  }

  function render() {
    renderCells();
    renderClose();
    renderLog();
  }

  // ---- Modals ----
  let pendingUncall = null;

  function askUncall(n) {
    pendingUncall = n;
    document.getElementById("confirm-uncall-num").textContent = String(n);
    document.getElementById("confirm-uncall").classList.add("open");
  }

  function setupModal(id, onConfirm) {
    const modal = document.getElementById(id);
    modal.querySelector('[data-action="cancel"]').addEventListener("click", () => {
      modal.classList.remove("open");
    });
    modal.querySelector('[data-action="confirm"]').addEventListener("click", () => {
      modal.classList.remove("open");
      onConfirm();
    });
    modal.addEventListener("click", (ev) => {
      if (ev.target === modal) modal.classList.remove("open");
    });
  }

  setupModal("confirm-uncall", () => {
    if (pendingUncall !== null) {
      uncallNumber(pendingUncall);
      pendingUncall = null;
    }
  });
  setupModal("confirm-reset", resetGame);

  document.getElementById("new-game-btn").addEventListener("click", () => {
    document.getElementById("confirm-reset").classList.add("open");
  });

  // ---- Bottom sheet ----
  const sheet = document.getElementById("sheet");
  const sheetBackdrop = document.getElementById("sheet-backdrop");

  function openSheet(cid) {
    const card = CARDS.find((c) => c.cid === cid);
    if (!card) return;
    const called = calledSet();
    const closed = card.numbers.filter((n) => called.has(n)).length;
    const level = state.cardLevel[cid] || 0;

    document.getElementById("sheet-seq").textContent = "#" + String(card.seq).padStart(3, "0");
    document.getElementById("sheet-cid").textContent = card.cid;
    document.getElementById("sheet-stars").textContent = renderStars(level);
    document.getElementById("sheet-progress").textContent = closed + "/15";

    const cardEl = document.getElementById("sheet-card");
    cardEl.innerHTML = "";
    // card.rows is already a 3x9 grid with null for empty cells -- render directly.
    for (let r = 0; r < 3; r++) {
      const row = card.rows[r];
      for (let c = 0; c < 9; c++) {
        const cell = document.createElement("div");
        cell.className = "card-cell";
        const val = row[c];
        if (val === null) {
          cell.classList.add("empty");
        } else {
          cell.textContent = String(val);
          if (called.has(val)) cell.classList.add("closed");
        }
        cardEl.appendChild(cell);
      }
    }

    sheetBackdrop.classList.add("open");
    sheet.classList.add("open");
  }

  function closeSheet() {
    sheet.classList.remove("open");
    sheetBackdrop.classList.remove("open");
  }

  function renderStars(level) {
    const filled = "★".repeat(level);
    const empty = "☆".repeat(3 - level);
    return filled + empty;
  }

  sheetBackdrop.addEventListener("click", closeSheet);

  // Swipe-down to dismiss
  let touchStartY = null;
  sheet.addEventListener("touchstart", (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener("touchmove", (e) => {
    if (touchStartY === null) return;
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 60) { closeSheet(); touchStartY = null; }
  }, { passive: true });
  sheet.addEventListener("touchend", () => { touchStartY = null; });

  // ---- Init ----
  buildGrid();
  // Reconcile state on load: cardLevel may be stale if CARDS changed (e.g. server restarted with new registry).
  // Recompute fresh from current called set.
  recomputeAndEmit();
  saveState();
  render();
})();
</script>

</body>
</html>
